<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #17013A;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .glow-purple {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: rgba(138, 5, 190, 0.15);
    border-radius: 50%;
    filter: blur(80px);
  }
  .glow-teal {
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 300px;
    height: 300px;
    background: rgba(0, 194, 203, 0.12);
    border-radius: 50%;
    filter: blur(60px);
  }
  .content {
    text-align: center;
    z-index: 1;
    position: relative;
  }
  .logo-icon {
    width: 80px;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 64px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }
  .tagline {
    font-size: 28px;
    font-weight: 600;
    background: linear-gradient(90deg, #8A05BE, #00C2CB);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 32px;
  }
  .pills {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .pill {
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pill-good {
    background: rgba(0, 194, 203, 0.12);
    color: #5EEAEF;
    border: 1px solid rgba(0, 194, 203, 0.2);
  }
  .pill-vibe {
    background: rgba(138, 5, 190, 0.12);
    color: #C77DFF;
    border: 1px solid rgba(138, 5, 190, 0.2);
  }
  .pill-heads {
    background: rgba(245, 166, 35, 0.12);
    color: #FFB84D;
    border: 1px solid rgba(245, 166, 35, 0.2);
  }
  .url {
    position: absolute;
    bottom: 32px;
    right: 40px;
    font-size: 18px;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="glow-purple"></div>
  <div class="glow-teal"></div>
  <div class="content">
    <h1>tavvy</h1>
    <div class="tagline">Real experiences, not fake stars.</div>
    <div class="pills">
      <div class="pill pill-good">Best Tacos ×42</div>
      <div class="pill pill-vibe">Cozy Vibes ×28</div>
      <div class="pill pill-good">Great WiFi ×19</div>
      <div class="pill pill-heads">Slow Service ×12</div>
    </div>
  </div>
  <div class="url">tavvy.com</div>
</body>
</html>
